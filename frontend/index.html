<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习 Agent v1.1 · AI Tutor</title>
<style>
  :root {
    --bg: #06090f; --surface: #0d1117; --border: #21262d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; opacity: .02; pointer-events: none;
    background-image: linear-gradient(rgba(88,166,255,0.3) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(88,166,255,0.3) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  /* Layout */
  .app { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }
  .main { flex: 1; display: flex; flex-direction: column; }

  header {
    padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  header .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  header .ver { font-size: .72rem; color: var(--dim); background: #161b22; padding: 2px 8px; border-radius: 4px; }
  header .kb-btn {
    margin-left: auto; background: #161b22; border: 1px solid var(--border); border-radius: 6px;
    color: var(--dim); padding: 6px 14px; font-size: .8rem; cursor: pointer; transition: all .2s;
  }
  header .kb-btn:hover { border-color: var(--accent); color: var(--accent); }
  header .kb-btn .badge {
    background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: .7rem;
    margin-left: 6px; display: none;
  }

  /* Sidebar */
  .sidebar {
    width: 0; background: var(--surface); border-left: 1px solid var(--border);
    overflow: hidden; transition: width .25s; display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar.open { width: 320px; padding: 16px; }
  .sidebar h3 { font-size: .9rem; color: #f0f6fc; margin-bottom: 12px; }
  .sidebar .upload-zone {
    border: 1px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center;
    cursor: pointer; margin-bottom: 16px; transition: all .2s; color: var(--dim); font-size: .82rem;
  }
  .sidebar .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
  .sidebar input[type=file] { display: none; }
  .sidebar .source-list { overflow-y: auto; flex: 1; }
  .sidebar .source-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: .8rem;
  }
  .sidebar .source-item:hover { background: #161b22; }
  .sidebar .source-item .name { color: var(--text); }
  .sidebar .source-item .count { color: var(--dim); font-size: .75rem; margin: 0 8px; }
  .sidebar .source-item .del {
    color: #f85149; cursor: pointer; font-size: .75rem; opacity: 0; transition: opacity .2s;
  }
  .sidebar .source-item:hover .del { opacity: 1; }
  .sidebar .stats { font-size: .78rem; color: var(--dim); margin-bottom: 12px; }

  /* Chat */
  #chat {
    flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .bubble {
    max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: .9rem; line-height: 1.6;
    animation: fadeIn .3s; white-space: pre-wrap;
  }
  .bubble.user { align-self: flex-end; background: #1a2332; border: 1px solid #2a3a50; }
  .bubble.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .bubble.ai code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: .82rem; color: var(--accent); }
  .bubble.ai pre { background: #161b22; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: .82rem; }
  .bubble .source-tag {
    font-size: .68rem; color: var(--green); margin-bottom: 4px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  footer {
    padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border);
  }
  .input-row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1; background: #161b22; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: .9rem; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: .9rem; cursor: pointer; font-weight: 600;
  }
  button.primary:hover { opacity: .85; }
  button.primary:disabled { opacity: .4; }
  .loading { align-self: center; color: var(--dim); font-size: .82rem; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3>📚 知识库</h3>
    <div class="stats" id="kbStats">加载中...</div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      📁 点击上传文档<br><small>PDF / Markdown / TXT / 代码文件</small>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.md,.txt,.py,.js,.html,.json" onchange="uploadFile(this)">
    <div class="source-list" id="sourceList"></div>
    <button onclick="clearKB()" style="margin-top:12px;background:transparent;border:1px solid #f85149;color:#f85149;border-radius:6px;padding:5px 10px;font-size:.75rem;cursor:pointer;">清空知识库</button>
  </div>

  <!-- Main -->
  <div class="main">
    <header>
      <span class="logo">🧠 学习 Agent</span>
      <span class="ver">v1.1</span>
      <button class="kb-btn" id="kbBtn" onclick="toggleSidebar()">
        知识库 <span class="badge" id="kbBadge">0</span>
      </button>
    </header>

    <div id="chat">
      <div class="bubble ai">
👋 你好！我是你的 AI 学习导师 v1.1。

✨ **新功能：知识库（RAG）** — 上传你的教材、笔记、文档，我会基于它们回答。

试试：
• 📁 点击右上角「知识库」上传一份 PDF
• 📖 上传后直接问书中内容
• ✍️ 「出题练习」也会基于你的文档
      </div>
    </div>

    <footer>
      <div class="input-row">
        <input type="text" id="input" placeholder="输入问题..." onkeydown="if(event.key==='Enter')send()">
        <button class="primary" id="sendBtn" onclick="send()">发送</button>
      </div>
    </footer>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sidebar = document.getElementById('sidebar');
let kbChunkCount = 0;

// ====== Sidebar ======
function toggleSidebar() {
  sidebar.classList.toggle('open');
  if (sidebar.classList.contains('open')) loadKBStats();
}

async function loadKBStats() {
  try {
    const r = await fetch('/api/kb/stats');
    const d = await r.json();
    document.getElementById('kbStats').innerHTML =
      `📊 ${d.total_chunks} 个文本块 · ${d.total_sources} 个文档`;
    document.getElementById('kbBadge').textContent = d.total_sources;
    document.getElementById('kbBadge').style.display = d.total_sources > 0 ? 'inline' : 'none';
    kbChunkCount = d.total_chunks;

    let html = '';
    for (const s of d.sources || []) {
      html += `<div class="source-item">
        <span class="name">📄 ${s.source}</span>
        <span class="count">${s.chunks}块</span>
        <span class="del" onclick="deleteSource('${s.source}')">✕</span>
      </div>`;
    }
    document.getElementById('sourceList').innerHTML = html || '<div style="color:var(--dim);font-size:.78rem;">暂无文档，上传一份试试</div>';
  } catch(e) { console.error(e); }
}

async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  const r = await fetch('/api/kb/upload', { method: 'POST', body: form });
  const d = await r.json();
  addBubble(`📁 已上传 <b>${d.filename}</b> — 拆分为 ${d.chunks_added} 个文本块，现在可以提问了`, 'ai', 'kb');
  loadKBStats();
  input.value = '';
}

async function deleteSource(name) {
  await fetch('/api/kb/source/' + encodeURIComponent(name), { method: 'DELETE' });
  loadKBStats();
}

async function clearKB() {
  if (!confirm('确认清空知识库？')) return;
  await fetch('/api/kb', { method: 'DELETE' });
  loadKBStats();
}

// ====== Chat ======
function addBubble(text, role, intent) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  let html = '';
  if (intent && role === 'ai') html += `<div class="source-tag">[${intent}]</div>`;
  html += text.replace(/\n/g, '<br>');
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading'; div.id = 'loading'; div.textContent = '思考中...';
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading'); if (el) el.remove();
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sendBtn.disabled = true;
  addBubble(msg, 'user');
  addLoading();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await resp.json();
    removeLoading();
    if (data.error) addBubble('⚠️ ' + data.error, 'ai');
    else addBubble(data.response, 'ai', data.intent);
  } catch(e) {
    removeLoading();
    addBubble('⚠️ 连接失败，请确认后端已启动', 'ai');
  }
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
