<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>学习 Agent v1.4.3 · AI Tutor + Quiz</title>
<style>
  :root {
    --bg: #06090f; --surface: #0d1117; --border: #21262d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --purple: #a371f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; opacity: .02; pointer-events: none;
    background-image: linear-gradient(rgba(88,166,255,0.3) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(88,166,255,0.3) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .app { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 10px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header .logo { font-size: 1.05rem; font-weight: 700; color: var(--accent); }
  header .ver { font-size: .68rem; color: var(--dim); background: #161b22; padding: 2px 7px; border-radius: 4px; }
  header .hdr-btn {
    background: #161b22; border: 1px solid var(--border); border-radius: 6px;
    color: var(--dim); padding: 5px 12px; font-size: .78rem; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 5px;
  }
  header .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  header .hdr-btn.active { border-color: var(--accent); color: var(--accent); background: #1a2436; }
  header .hdr-btn.quiz-btn { border-color: var(--purple); color: var(--purple); }
  header .hdr-btn.quiz-btn:hover { background: #1a1a2e; }
  header .spacer { flex: 1; }

  /* Sidebar */
  .sidebar {
    width: 0; background: var(--surface); border-left: 1px solid var(--border);
    overflow: hidden; transition: width .25s; display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar.open { width: 340px; padding: 16px 14px; }
  .sidebar h3 { font-size: .85rem; color: #f0f6fc; margin-bottom: 10px; flex-shrink: 0; }
  .sidebar .tab-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .sidebar .tab-content.active { display: flex; }

  /* KB tab */
  .upload-zone {
    border: 1px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center;
    cursor: pointer; margin-bottom: 12px; transition: all .2s; color: var(--dim); font-size: .8rem; flex-shrink: 0;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
  .sidebar input[type=file] { display: none; }
  .source-list { overflow-y: auto; }
  .source-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 8px; border-radius: 6px; margin-bottom: 3px; font-size: .78rem;
  }
  .source-item:hover { background: #161b22; }
  .source-item .name { color: var(--text); }
  .source-item .count { color: var(--dim); font-size: .72rem; }
  .source-item .del { color: var(--red); cursor: pointer; font-size: .72rem; opacity: 0; transition: opacity .2s; }
  .source-item:hover .del { opacity: 1; }

  /* KG tab */
  .kg-summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; flex-shrink: 0;
  }
  .kg-card {
    background: #161b22; border-radius: 8px; padding: 10px; text-align: center;
  }
  .kg-card .num { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .kg-card .lbl { font-size: .68rem; color: var(--dim); margin-top: 2px; }
  .kg-card.due .num { color: var(--yellow); }
  .kg-card.mastered .num { color: var(--green); }
  .kg-card.weak .num { color: var(--red); }

  .section-title { font-size: .76rem; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 6px; }
  .topic-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: .8rem;
  }
  .topic-item .tname { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topic-item .tlabel { font-size: .68rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
  .tlabel.mastered { background: #1a3a1a; color: var(--green); }
  .tlabel.learning { background: #1a2a3a; color: var(--accent); }
  .tlabel.weak { background: #3a1a1a; color: var(--red); }

  .mastery-bar {
    width: 60px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; flex-shrink: 0;
  }
  .mastery-bar .fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .fill.high { background: var(--green); }
  .fill.mid { background: var(--accent); }
  .fill.low { background: var(--yellow); }
  .review-badge { font-size: .65rem; color: var(--yellow); flex-shrink: 0; }

  /* Quiz config form */
  .quiz-form { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .quiz-form label { font-size: .75rem; color: var(--dim); }
  .quiz-form select, .quiz-form input {
    background: #161b22; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 7px 10px; font-size: .8rem; outline: none; width: 100%;
  }
  .quiz-form select:focus, .quiz-form input:focus { border-color: var(--accent); }
  .btn-start-quiz {
    background: var(--purple); color: #fff; border: none; border-radius: 8px;
    padding: 10px; font-size: .85rem; cursor: pointer; font-weight: 600; margin-top: 4px;
  }
  .btn-start-quiz:hover { opacity: .85; }
  .btn-start-quiz:disabled { opacity: .4; }

  /* Quiz Modal — full screen overlay */
  .quiz-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; justify-content: center; align-items: center;
    pointer-events: none;
  }
  .quiz-overlay.show { display: flex; pointer-events: none; }
  .quiz-overlay .quiz-modal { pointer-events: auto; }
  .quiz-modal {
    position: relative;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 28px 32px;
  }
  .quiz-modal .quiz-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .quiz-modal .quiz-header .q-title { font-size: .95rem; color: var(--purple); font-weight: 600; }
  .quiz-modal .quiz-header .q-progress { font-size: .78rem; color: var(--dim); }
  .quiz-modal .quiz-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    color: var(--dim); font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
  }
  .quiz-modal .quiz-close:hover { color: var(--red); }
  .quiz-modal .q-topic { font-size: .72rem; color: var(--dim); margin-bottom: 4px; }
  .quiz-modal .q-difficulty {
    display: inline-block; font-size: .68rem; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px;
  }
  .q-difficulty.easy { background: #1a3a1a; color: var(--green); }
  .q-difficulty.medium { background: #2a2a1a; color: var(--yellow); }
  .q-difficulty.hard { background: #3a1a1a; color: var(--red); }
  .quiz-modal .q-text { font-size: .95rem; line-height: 1.7; margin-bottom: 18px; color: #f0f6fc; }
  .quiz-modal .q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .quiz-modal .q-option {
    background: #161b22; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: .85rem; cursor: pointer; transition: all .15s;
    text-align: left; color: var(--text);
  }
  .quiz-modal .q-option:hover { border-color: var(--accent); background: #1a2436; }
  .quiz-modal .q-option.selected { border-color: var(--purple); background: #1a1a2e; color: var(--purple); }
  .quiz-modal .q-fill-input {
    width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 14px; font-size: .85rem; resize: vertical; min-height: 60px;
    outline: none; margin-bottom: 18px; font-family: inherit;
  }
  .quiz-modal .q-fill-input:focus { border-color: var(--purple); }
  .btn-submit {
    background: var(--purple); color: #fff; border: none; border-radius: 8px;
    padding: 10px 24px; font-size: .85rem; cursor: pointer; font-weight: 600; width: 100%;
  }
  .btn-submit:hover { opacity: .85; }
  .btn-submit:disabled { opacity: .4; }

  /* Result overlay */
  .result-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 101; justify-content: center; align-items: flex-end;
  }
  .result-overlay.show { display: flex; }
  .result-toast {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 0 0;
    width: 90%; max-width: 600px; padding: 18px 24px 24px;
    animation: slideUp .3s;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .result-toast .result-icon { font-size: 1.5rem; margin-bottom: 8px; }
  .result-toast .result-text { font-size: .85rem; line-height: 1.6; margin-bottom: 12px; }
  .result-toast .result-explanation {
    font-size: .78rem; color: var(--dim); line-height: 1.5;
    padding: 10px; background: #161b22; border-radius: 8px; margin-bottom: 12px;
  }
  .btn-next {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px 20px; font-size: .82rem; cursor: pointer; font-weight: 600;
  }
  .btn-next:hover { opacity: .85; }

  /* Quiz summary */
  .summary-card {
    background: #161b22; border-radius: 12px; padding: 20px; margin-bottom: 14px;
  }
  .summary-card .s-grade { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .summary-card .s-score { font-size: .85rem; color: var(--dim); margin-bottom: 14px; }
  .summary-card .s-topics { font-size: .78rem; }
  .summary-card .s-topic-row {
    display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border);
  }
  .wrong-item {
    background: #161b22; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: .78rem;
  }
  .wrong-item .w-q { color: var(--text); margin-bottom: 4px; }
  .wrong-item .w-a { color: var(--red); }
  .wrong-item .w-correct { color: var(--green); }

  /* Chat */
  #chat {
    flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px;
  }
  .bubble {
    max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: .88rem; line-height: 1.6;
    animation: fadeIn .25s; white-space: pre-wrap;
  }
  .bubble.user { align-self: flex-end; background: #1a2332; border: 1px solid #2a3a50; }
  .bubble.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .bubble.ai code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: .8rem; color: var(--accent); }
  .bubble.ai pre { background: #161b22; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: .8rem; }
  .bubble .source-tag { font-size: .65rem; color: var(--green); margin-bottom: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  footer {
    padding: 12px 18px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1; background: #161b22; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: .9rem; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: .9rem; cursor: pointer; font-weight: 600;
  }
  button.primary:hover { opacity: .85; }
  button.primary:disabled { opacity: .4; }
  .loading { align-self: center; color: var(--dim); font-size: .8rem; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <!-- KB tab -->
    <div class="tab-content active" id="tabKb">
      <h3>📚 知识库</h3>
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        📁 点击上传文档<br><small>PDF / Markdown / TXT / 代码文件</small>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.md,.txt,.py,.js,.html,.json" onchange="uploadFile(this)">
      <div class="source-list" id="sourceList"></div>
      <button onclick="clearKB()" style="margin-top:10px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:5px 10px;font-size:.72rem;cursor:pointer;">清空知识库</button>
    </div>

    <!-- KG tab -->
    <div class="tab-content" id="tabKg">
      <h3>🧠 知识图谱</h3>
      <div class="kg-summary" id="kgSummary"></div>
      <div class="section-title">📖 所有主题</div>
      <div id="kgTopics"></div>
      <div class="section-title">⚠️ 需要加强</div>
      <div id="kgWeak"></div>
      <div class="section-title">📋 待复习</div>
      <div id="kgReview"></div>
    </div>

    <!-- Quiz tab -->
    <div class="tab-content" id="tabQuiz">
      <h3>📝 开始测验</h3>
      <div class="quiz-form">
        <label>主题（留空=综合）</label>
        <input type="text" id="quizTopic" placeholder="如 Python、机器学习...">
        <label>难度</label>
        <select id="quizDifficulty">
          <option value="easy">🌟 简单</option>
          <option value="medium" selected>📖 中等</option>
          <option value="hard">🔥 困难</option>
        </select>
        <label>题型</label>
        <select id="quizType">
          <option value="choice">✅ 选择题</option>
          <option value="fill">✍️ 填空题</option>
          <option value="mixed">🎯 混搭（选择+填空+简答）</option>
        </select>
        <label>题目数量</label>
        <input type="number" id="quizCount" value="5" min="1" max="20">
        <button class="btn-start-quiz" id="btnStartQuiz" onclick="startQuiz()">🎯 开始测验</button>
        <div style="color:var(--dim);font-size:.72rem;margin-top:6px;">
          出题需要约 10-30 秒，请耐心等待
        </div>
      </div>
      <div class="section-title" style="margin-top:16px;">📊 历史测验</div>
      <div id="quizHistory" style="color:var(--dim);font-size:.74rem;">暂无记录</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <header>
      <span class="logo">🧠 学习 Agent</span>
      <span class="ver">v1.4</span>
      <span class="spacer"></span>
      <button class="hdr-btn" id="btnKb" onclick="openTab('kb')">📚 知识库</button>
      <button class="hdr-btn" id="btnKg" onclick="openTab('kg')">🧠 知识图谱</button>
      <button class="hdr-btn quiz-btn" id="btnQuiz" onclick="openTab('quiz')">📝 测验</button>
    </header>

    <div id="chat">
      <div class="bubble ai">
👋 你好！我是你的 AI 学习导师 v1.4。

**新功能：** 右上角「📝 测验」进入多轮答题
- 选择题 / 填空题 / 简答题
- 自动判卷 + 解析
- 薄弱环节智能出题

试试：「出一道关于 Python 的题」开始对话，或点右上角「测验」直接开始
      </div>
    </div>

    <footer>
      <div class="input-row">
        <input type="text" id="input" placeholder="输入问题..." onkeydown="if(event.key==='Enter' && !quizActive) send()">
        <button class="primary" id="sendBtn" onclick="send()">发送</button>
      </div>
    </footer>
  </div>
</div>

<!-- Quiz Modal -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-modal" id="quizModal"></div>
</div>

<!-- Result Toast -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-toast" id="resultToast"></div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sidebar = document.getElementById('sidebar');
let currentTab = 'kb';
let quizActive = false;
let currentSessionId = null;
let selectedOption = null;

// XSS 防护：HTML 转义
function escapeHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// JS 字符串字面量转义（用于 onclick 等属性）
function escapeJsStr(s) {
  if (!s) return '';
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ====== Tab switching ======
function openTab(tab) {
  currentTab = tab;
  sidebar.classList.add('open');
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab' + (tab==='kb'?'Kb':tab==='kg'?'Kg':'Quiz')).classList.add('active');
  document.querySelectorAll('.hdr-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + (tab==='kb'?'Kb':tab==='kg'?'Kg':'Quiz')).classList.add('active');
  if (tab === 'kb') loadKBStats();
  else if (tab === 'kg') loadKG();
}

// ====== KB ======
async function loadKBStats() {
  try {
    const r = await fetch('/api/kb/stats');
    const d = await r.json();
    let html = '';
    for (const s of d.sources || []) {
      html += `<div class="source-item">
        <span class="name">📄 ${s.source}</span>
        <span class="count">${s.chunks}块</span>
        <span class="del" onclick="deleteSource('${s.source}')">✕</span>
      </div>`;
    }
    document.getElementById('sourceList').innerHTML = html || '<div style="color:var(--dim);font-size:.74rem;">暂无文档</div>';
  } catch(e) { console.error(e); }
}

async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  const r = await fetch('/api/kb/upload', { method: 'POST', body: form });
  const d = await r.json();
  addBubble(`📁 已上传 <b>${d.filename}</b> — ${d.chunks_added} 个分块`, 'ai', 'kb');
  loadKBStats();
  input.value = '';
}

async function deleteSource(name) {
  await fetch('/api/kb/source/' + encodeURIComponent(name), { method: 'DELETE' });
  loadKBStats();
}

async function clearKB() {
  if (!confirm('确认清空知识库？')) return;
  await fetch('/api/kb', { method: 'DELETE' });
  loadKBStats();
}

// ====== KG ======
async function loadKG() {
  try {
    const [topicsR, summaryR] = await Promise.all([
      fetch('/api/knowledge/topics'),
      fetch('/api/knowledge')
    ]);
    const topics = (await topicsR.json()).topics || [];
    const summary = await summaryR.json();

    document.getElementById('kgSummary').innerHTML = `
      <div class="kg-card"><div class="num">${summary.total_topics}</div><div class="lbl">已学主题</div></div>
      <div class="kg-card mastered"><div class="num">${summary.mastered}</div><div class="lbl">已掌握</div></div>
      <div class="kg-card weak"><div class="num">${summary.learning}</div><div class="lbl">学习中</div></div>
      <div class="kg-card due"><div class="num">${summary.due_review}</div><div class="lbl">待复习</div></div>
    `;

    let topicHtml = '';
    for (const t of topics) {
      const ml = t.mastery;
      const fillClass = ml >= 0.65 ? 'high' : ml >= 0.4 ? 'mid' : 'low';
      const labelClass = ml >= 0.65 ? 'mastered' : 'learning';
      const pct = Math.round(ml * 100);
      topicHtml += `<div class="topic-item">
        <span class="tname" title="${t.topic}">${t.topic}</span>
        <div class="mastery-bar"><div class="fill ${fillClass}" style="width:${pct}%"></div></div>
        <span class="tlabel ${labelClass}">${t.label}</span>
        ${t.needs_review ? '<span class="review-badge">⏰</span>' : ''}
      </div>`;
    }
    document.getElementById('kgTopics').innerHTML = topicHtml || '<div style="color:var(--dim);font-size:.74rem;">还没有学习记录</div>';

    let weakHtml = '';
    for (const w of summary.weakest || []) {
      weakHtml += `<div class="topic-item">
        <span class="tname">${w.topic}</span>
        <span class="tlabel weak">${w.label}</span>
      </div>`;
    }
    document.getElementById('kgWeak').innerHTML = weakHtml || '<div style="color:var(--dim);font-size:.74rem;">暂无</div>';

    let reviewHtml = '';
    for (const t of (summary.due_topics || [])) {
      reviewHtml += `<div class="topic-item"><span class="tname">${t}</span><span class="review-badge">复习</span></div>`;
    }
    document.getElementById('kgReview').innerHTML = reviewHtml || '<div style="color:var(--dim);font-size:.74rem;">暂无到期复习</div>';

  } catch(e) { console.error('KG load error:', e); }
}

// ====== Chat ======
function addBubble(text, role, intent) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  let html = '';
  if (intent && role === 'ai') html += `<div class="source-tag">[${intent}]</div>`;
  html += text.replace(/\n/g, '<br>');
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading'; div.id = 'loading'; div.textContent = '思考中...';
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading'); if (el) el.remove();
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sendBtn.disabled = true;
  addBubble(msg, 'user');
  addLoading();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await resp.json();
    removeLoading();
    if (data.error) addBubble('⚠️ ' + data.error, 'ai');
    else addBubble(data.response, 'ai', data.intent);
    if (currentTab === 'kg') loadKG();
  } catch(e) {
    removeLoading();
    addBubble('⚠️ 连接失败，请确认后端已启动', 'ai');
  }
  sendBtn.disabled = false;
  input.focus();
}

// ============================================================
// Quiz System
// ============================================================

function difficultyLabel(d) {
  return d === 'easy' ? '🌟 简单' : d === 'medium' ? '📖 中等' : '🔥 困难';
}

async function startQuiz() {
  const btn = document.getElementById('btnStartQuiz');
  btn.disabled = true;
  btn.textContent = '⏳ 生成题目中...';

  const topic = document.getElementById('quizTopic').value.trim();
  const difficulty = document.getElementById('quizDifficulty').value;
  const qType = document.getElementById('quizType').value;
  const count = parseInt(document.getElementById('quizCount').value) || 5;

  try {
    const resp = await fetch('/api/quiz/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, difficulty, question_type: qType, count }),
    });
    const data = await resp.json();
    if (resp.ok) {
      currentSessionId = data.session_id;
      quizActive = true;
      selectedOption = null;
      renderQuestion(data.question, data.progress);
      document.getElementById('quizOverlay').classList.add('show');
      sidebar.classList.remove('open');
    } else {
      addBubble('⚠️ 出题失败: ' + (data.detail || '未知错误'), 'ai');
    }
  } catch(e) {
    addBubble('⚠️ 连接失败', 'ai');
  }
  btn.disabled = false;
  btn.textContent = '🎯 开始测验';
}

function renderQuestion(q, progress) {
  const modal = document.getElementById('quizModal');
  const typeLabel = q.q_type === 'choice' ? '选择题' : q.q_type === 'fill' ? '填空题' : '简答题';
  selectedOption = null;

  let html = `
    <span class="quiz-close" onclick="closeQuiz()" title="关闭测验">✕</span>
    <div class="quiz-header">
      <span class="q-title">📝 ${escapeHtml(typeLabel)}</span>
      <span class="q-progress">${progress.current} / ${progress.total}</span>
    </div>
    <div class="q-topic">📌 ${escapeHtml(q.topic)}</div>
    <span class="q-difficulty ${escapeHtml(q.difficulty)}">${difficultyLabel(q.difficulty)}</span>
    <div class="q-text">${escapeHtml(q.text)}</div>
  `;

  if (q.q_type === 'choice' && q.options && q.options.length > 0) {
    html += '<div class="q-options">';
    for (const opt of q.options) {
      // onclick 用 JS 字符串转义（\\\\' 而非 HTML 实体）; 显示文本用 HTML 转义
      html += `<button class="q-option" onclick="selectOption(this, '${escapeJsStr(opt)}')">${escapeHtml(opt)}</button>`;
    }
    html += '</div>';
    html += `<button class="btn-submit" id="btnSubmitAnswer" onclick="submitAnswer()" disabled>请先选择答案</button>`;
  } else {
    // fill / short answer
    html += `<textarea class="q-fill-input" id="fillAnswer" placeholder="请输入你的答案..." rows="3"></textarea>`;
    html += `<button class="btn-submit" id="btnSubmitAnswer" onclick="submitAnswer()">提交答案</button>`;
  }

  modal.innerHTML = html;
}

function selectOption(el, text) {
  document.querySelectorAll('.q-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedOption = text;
  document.getElementById('btnSubmitAnswer').disabled = false;
}

function closeQuiz() {
  if (currentSessionId && !confirm('确定退出测验？当前进度将丢失。')) return;
  document.getElementById('quizOverlay').classList.remove('show');
  document.getElementById('resultOverlay').classList.remove('show');
  quizActive = false;
  selectedOption = null;
  currentSessionId = null;
  lastAnswerResponse = null;
  sidebar.classList.add('open');
  openTab('quiz');
}

// Store the last answer response for next question navigation
let lastAnswerResponse = null;

async function submitAnswer() {
  let answer;
  const qType = document.querySelector('.quiz-header .q-title')?.textContent || '';

  if (qType.includes('选择')) {
    if (!selectedOption) return;
    answer = selectedOption;
  } else {
    answer = document.getElementById('fillAnswer')?.value.trim();
    if (!answer) return;
  }

  const btn = document.getElementById('btnSubmitAnswer');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 判卷中...'; }

  try {
    const resp = await fetch('/api/quiz/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSessionId, answer }),
    });
    const data = await resp.json();
    if (resp.ok) {
      lastAnswerResponse = data;
      showResult(data);
    } else {
      alert('出错了: ' + (data.detail || ''));
    }
  } catch(e) {
    alert('连接失败');
  }
  if (btn) { btn.disabled = false; btn.textContent = '提交答案'; }
}

function showResult(data) {
  const toast = document.getElementById('resultToast');
  const icon = data.correct ? '✅' : '❌';
  const label = data.correct ? '回答正确！' : '回答错误';
  const color = data.correct ? 'var(--green)' : 'var(--red)';

  let html = `
    <div class="result-icon" style="color:${color}">${icon} ${label}</div>
    <div class="result-text" style="color:${color}">
      得分: ${data.progress.correct} / ${data.progress.answered}
    </div>
    <div class="result-explanation">${data.explanation}</div>
  `;

  if (data.finished) {
    // Quiz done — show summary
    html += `<button class="btn-next" onclick="showQuizSummary()">📊 查看成绩单</button>`;
  } else {
    html += `<button class="btn-next" onclick="nextQuestion()">➡️ 下一题</button>`;
  }

  toast.innerHTML = html;
  document.getElementById('resultOverlay').classList.add('show');
}

function nextQuestion() {
  document.getElementById('resultOverlay').classList.remove('show');
  const data = lastAnswerResponse;
  if (data && data.next_question) {
    renderQuestion(data.next_question, data.progress);
  } else if (data && data.finished) {
    document.getElementById('quizOverlay').classList.remove('show');
    showQuizSummary();
  } else {
    document.getElementById('quizOverlay').classList.remove('show');
    quizActive = false;
    sidebar.classList.add('open');
    openTab('quiz');
    addBubble('📝 测验已结束或出现异常。', 'ai');
  }
}

async function showQuizSummary() {
  document.getElementById('quizOverlay').classList.remove('show');
  document.getElementById('resultOverlay').classList.remove('show');
  quizActive = false;
  sidebar.classList.add('open');
  openTab('quiz');

  try {
    const resp = await fetch('/api/quiz/summary/' + currentSessionId);
    const data = await resp.json();

    let html = `<div class="summary-card">
      <div class="s-grade">${data.grade}</div>
      <div class="s-score">${data.correct} / ${data.total} 正确 (${data.percentage}%)</div>`;

    if (data.topic_performance && data.topic_performance.length > 0) {
      html += '<div class="section-title" style="margin-top:12px;">📊 知识点表现</div>';
      html += '<div class="s-topics">';
      for (const tp of data.topic_performance) {
        const pct = tp.total > 0 ? Math.round(tp.correct / tp.total * 100) : 0;
        const c = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
        html += `<div class="s-topic-row"><span>${tp.topic}</span><span style="color:${c}">${tp.correct}/${tp.total} (${pct}%)</span></div>`;
      }
      html += '</div>';
    }
    html += '</div>';

    // Wrong answers
    if (data.wrong_answers && data.wrong_answers.length > 0) {
      html += '<div class="section-title">❌ 错题回顾</div>';
      for (const w of data.wrong_answers) {
        html += `<div class="wrong-item">
          <div class="w-q">${w.num}. ${escapeHtml(w.question)}</div>
          <div class="w-a">你的答案: ${escapeHtml(w.user_answer)}</div>
          <div class="w-correct">正确答案: ${escapeHtml(w.correct_answer)}</div>
          <div style="color:var(--dim);margin-top:4px;">${escapeHtml(w.explanation)}</div>
        </div>`;
      }
    } else if (data.total === data.correct) {
      html += '<div style="color:var(--green);font-size:.85rem;text-align:center;padding:16px;">🎉 全部正确！太厉害了！</div>';
    }

    document.getElementById('quizHistory').innerHTML = html;

    // Also add to chat
    addBubble(`📊 测验成绩: ${data.grade}\n${data.correct}/${data.total} 正确 (${data.percentage}%)\n主题: ${data.topic}`, 'ai', 'quiz');

    if (currentTab === 'kg') loadKG();

  } catch(e) {
    console.error(e);
  }
}
</script>
