<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习 Agent · AI Tutor</title>
<style>
  :root {
    --bg: #06090f; --surface: #0d1117; --border: #21262d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --user-bubble: #1a2332; --ai-bubble: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column;
  }
  body::before {
    content: ""; position: fixed; inset: 0; opacity: .02;
    background-image: linear-gradient(rgba(88,166,255,0.3) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(88,166,255,0.3) 1px, transparent 1px);
    background-size: 50px 50px; pointer-events: none;
  }

  header {
    padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; position: relative; z-index: 1;
  }
  header .logo { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  header .sub { font-size: .78rem; color: var(--dim); }

  #chat {
    flex: 1; overflow-y: auto; padding: 20px; position: relative; z-index: 1;
    display: flex; flex-direction: column; gap: 14px;
  }

  .bubble {
    max-width: 75%; padding: 12px 16px; border-radius: 12px;
    font-size: .9rem; line-height: 1.6; animation: fadeIn .3s;
  }
  .bubble.user {
    align-self: flex-end; background: #1a2332; border: 1px solid #2a3a50;
  }
  .bubble.ai {
    align-self: flex-start; background: var(--surface); border: 1px solid var(--border);
    white-space: pre-wrap;
  }
  .bubble.ai code {
    background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: .82rem;
    color: var(--accent);
  }
  .bubble.ai pre {
    background: #161b22; padding: 10px; border-radius: 8px; overflow-x: auto;
    margin: 6px 0; font-size: .82rem;
  }
  .bubble .intent {
    font-size: .7rem; color: var(--dim); margin-bottom: 4px; display: none;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  footer {
    padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border);
    position: relative; z-index: 1;
  }
  .input-row { display: flex; gap: 10px; }
  input {
    flex: 1; background: #161b22; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: .9rem; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: .9rem; cursor: pointer; font-weight: 600;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; }

  .loading { align-self: center; color: var(--dim); font-size: .82rem; }
  .suggestions {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0;
  }
  .suggestions span {
    background: #161b22; border: 1px solid var(--border); border-radius: 16px;
    padding: 5px 12px; font-size: .78rem; color: var(--dim); cursor: pointer;
    transition: all .2s;
  }
  .suggestions span:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <span class="logo">🧠 学习 Agent</span>
  <span class="sub">AI 驱动的个人学习导师</span>
</header>

<div id="chat">
  <div class="bubble ai">
👋 你好！我是你的 AI 学习导师。

我可以帮你：
• 📖 <b>答疑解惑</b> — 解释概念、讲解知识点
• ✍️ <b>出题练习</b> — 生成练习题，巩固所学
• 📚 <b>复习回顾</b> — 检索历史学习记录
• 📋 <b>制定计划</b> — 规划学习路线

试试问我一个问题，或者说「帮我制定学习计划」吧！
  </div>
</div>

<footer>
  <div class="suggestions" id="suggestions">
    <span onclick="ask('什么是 Python 装饰器')">什么是 Python 装饰器</span>
    <span onclick="ask('帮我制定学习计划')">帮我制定学习计划</span>
    <span onclick="ask('出题练习')">出题练习</span>
    <span onclick="ask('复习')">复习</span>
  </div>
  <div class="input-row">
    <input id="input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function addBubble(text, role, intent) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  if (intent && role === 'ai') {
    div.innerHTML = `<div class="intent">[${intent}]</div>` + text.replace(/\n/g, '<br>');
  } else {
    div.innerHTML = text.replace(/\n/g, '<br>');
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading';
  div.textContent = '思考中...';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  sendBtn.disabled = true;

  addBubble(msg, 'user');
  addLoading();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await resp.json();
    removeLoading();
    if (data.error) {
      addBubble('⚠️ ' + data.error, 'ai');
    } else {
      addBubble(data.response, 'ai', data.intent);
    }
  } catch (e) {
    removeLoading();
    addBubble('⚠️ 连接失败，请确认后端已启动 (python -m uvicorn api.main:app --port 8000)', 'ai');
  }
  sendBtn.disabled = false;
  input.focus();
}

function ask(text) {
  input.value = text;
  send();
}
</script>

</body>
</html>
